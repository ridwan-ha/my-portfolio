<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#0a0c0e" rx="12"/>

  <text x="250" y="28" text-anchor="middle" font-family="monospace" font-size="13" fill="#00FFCD" letter-spacing="3">NETWORK TOPOLOGY</text>
  <line x1="60" y1="35" x2="440" y2="35" stroke="#00FFCD" stroke-width="0.5" opacity=".4"/>

  <!-- OSI layers left -->
  <text x="70" y="58" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFCD" opacity=".7">OSI MODEL</text>
  <rect x="15" y="63"  width="110" height="19" rx="3" fill="rgba(0,255,205,0.18)" stroke="#00FFCD" stroke-width="1"/>
  <text x="70" y="76"  text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">7 — Application</text>
  <rect x="15" y="84"  width="110" height="19" rx="3" fill="rgba(0,255,205,0.14)" stroke="#00FFCD" stroke-width="0.8"/>
  <text x="70" y="97"  text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">6 — Presentation</text>
  <rect x="15" y="105" width="110" height="19" rx="3" fill="rgba(0,255,205,0.11)" stroke="#00FFCD" stroke-width="0.8"/>
  <text x="70" y="118" text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">5 — Session</text>
  <rect x="15" y="126" width="110" height="19" rx="3" fill="rgba(0,255,205,0.08)" stroke="#00FFCD" stroke-width="0.8"/>
  <text x="70" y="139" text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">4 — Transport</text>
  <rect x="15" y="147" width="110" height="19" rx="3" fill="rgba(0,255,205,0.06)" stroke="#00FFCD" stroke-width="0.8"/>
  <text x="70" y="160" text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">3 — Network</text>
  <rect x="15" y="168" width="110" height="19" rx="3" fill="rgba(0,255,205,0.04)" stroke="#00FFCD" stroke-width="0.8"/>
  <text x="70" y="181" text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">2 — Data Link</text>
  <rect x="15" y="189" width="110" height="19" rx="3" fill="rgba(0,255,205,0.02)" stroke="#00FFCD" stroke-width="0.8"/>
  <text x="70" y="202" text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">1 — Physical</text>

  <!-- divider -->
  <line x1="145" y1="50" x2="145" y2="260" stroke="#00FFCD" stroke-width="0.5" stroke-dasharray="4 4" opacity=".3"/>

  <!-- topology right -->
  <text x="320" y="58" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFCD" opacity=".7">STAR TOPOLOGY</text>

  <!-- central switch -->
  <rect x="275" y="120" width="90" height="28" rx="6" fill="#0d2b26" stroke="#00FFCD" stroke-width="2"/>
  <text x="320" y="138" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFCD">SWITCH</text>

  <!-- PC nodes -->
  <circle cx="200" cy="85"  r="20" fill="#1C1D20" stroke="#00FFCD" stroke-width="1.2"/>
  <text x="200" y="89"  text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">PC 1</text>

  <circle cx="320" cy="75"  r="20" fill="#1C1D20" stroke="#00FFCD" stroke-width="1.2"/>
  <text x="320" y="79"  text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">PC 2</text>

  <circle cx="430" cy="85"  r="20" fill="#1C1D20" stroke="#00FFCD" stroke-width="1.2"/>
  <text x="430" y="89"  text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">PC 3</text>

  <circle cx="200" cy="195" r="20" fill="#1C1D20" stroke="#00FFCD" stroke-width="1.2"/>
  <text x="200" y="199" text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">PC 4</text>

  <circle cx="430" cy="195" r="20" fill="#1C1D20" stroke="#00FFCD" stroke-width="1.2"/>
  <text x="430" y="199" text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD">PC 5</text>

  <!-- connections -->
  <line x1="218" y1="98"  x2="278" y2="125" stroke="#00FFCD" stroke-width="1.2" opacity=".6"/>
  <line x1="320" y1="95"  x2="320" y2="120" stroke="#00FFCD" stroke-width="1.2" opacity=".6"/>
  <line x1="412" y1="98"  x2="362" y2="125" stroke="#00FFCD" stroke-width="1.2" opacity=".6"/>
  <line x1="218" y1="182" x2="278" y2="145" stroke="#00FFCD" stroke-width="1.2" opacity=".6"/>
  <line x1="412" y1="182" x2="362" y2="145" stroke="#00FFCD" stroke-width="1.2" opacity=".6"/>

  <!-- subnet -->
  <text x="320" y="235" text-anchor="middle" font-family="monospace" font-size="8" fill="#00FFCD" opacity=".5">Subnet: 192.168.1.0/24</text>
  <text x="250" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFCD" opacity=".5">5 hosts connected — all devices communicating ✓</text>
</svg>
