<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#0a0c0e" rx="12"/>

  <!-- title -->
  <text x="250" y="28" text-anchor="middle" font-family="monospace" font-size="13" fill="#00FFCD" letter-spacing="3">HOME NETWORK SIMULATION</text>
  <line x1="60" y1="35" x2="440" y2="35" stroke="#00FFCD" stroke-width="0.5" opacity=".4"/>

  <!-- internet cloud -->
  <ellipse cx="250" cy="75" rx="55" ry="24" fill="#0d2b26" stroke="#00FFCD" stroke-width="1.5"/>
  <text x="250" y="80" text-anchor="middle" font-family="monospace" font-size="10" fill="#00FFCD">INTERNET</text>

  <!-- router -->
  <rect x="210" y="120" width="80" height="34" rx="6" fill="#0d2b26" stroke="#00FFCD" stroke-width="2"/>
  <text x="250" y="141" text-anchor="middle" font-family="monospace" font-size="10" fill="#00FFCD">ROUTER</text>

  <!-- internet to router -->
  <line x1="250" y1="99" x2="250" y2="120" stroke="#00FFCD" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- devices -->
  <!-- PC1 -->
  <rect x="40" y="210" width="60" height="36" rx="5" fill="#1C1D20" stroke="#00FFCD" stroke-width="1.2"/>
  <text x="70" y="232" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFCD">PC 1</text>
  <text x="70" y="244" text-anchor="middle" font-family="monospace" font-size="7" fill="#00FFCD" opacity=".5">192.168.1.2</text>

  <!-- PC2 -->
  <rect x="120" y="210" width="60" height="36" rx="5" fill="#1C1D20" stroke="#00FFCD" stroke-width="1.2"/>
  <text x="150" y="232" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFCD">PC 2</text>
  <text x="150" y="244" text-anchor="middle" font-family="monospace" font-size="7" fill="#00FFCD" opacity=".5">192.168.1.3</text>

  <!-- Laptop -->
  <rect x="210" y="210" width="80" height="36" rx="5" fill="#1C1D20" stroke="#00FFCD" stroke-width="1.2"/>
  <text x="250" y="232" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFCD">LAPTOP</text>
  <text x="250" y="244" text-anchor="middle" font-family="monospace" font-size="7" fill="#00FFCD" opacity=".5">192.168.1.4</text>

  <!-- Phone -->
  <rect x="310" y="210" width="60" height="36" rx="5" fill="#1C1D20" stroke="#00FFCD" stroke-width="1.2"/>
  <text x="340" y="232" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFCD">PHONE</text>
  <text x="340" y="244" text-anchor="middle" font-family="monospace" font-size="7" fill="#00FFCD" opacity=".5">192.168.1.5</text>

  <!-- Switch -->
  <rect x="390" y="210" width="70" height="36" rx="5" fill="#1C1D20" stroke="#00FFCD" stroke-width="1.2"/>
  <text x="425" y="232" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFCD">SWITCH</text>
  <text x="425" y="244" text-anchor="middle" font-family="monospace" font-size="7" fill="#00FFCD" opacity=".5">192.168.1.6</text>

  <!-- router to devices -->
  <line x1="230" y1="154" x2="70"  y2="210" stroke="#00FFCD" stroke-width="1" stroke-dasharray="5 3" opacity=".6"/>
  <line x1="235" y1="154" x2="150" y2="210" stroke="#00FFCD" stroke-width="1" stroke-dasharray="5 3" opacity=".6"/>
  <line x1="250" y1="154" x2="250" y2="210" stroke="#00FFCD" stroke-width="1" stroke-dasharray="5 3" opacity=".6"/>
  <line x1="265" y1="154" x2="340" y2="210" stroke="#00FFCD" stroke-width="1" stroke-dasharray="5 3" opacity=".6"/>
  <line x1="270" y1="154" x2="425" y2="210" stroke="#00FFCD" stroke-width="1" stroke-dasharray="5 3" opacity=".6"/>

  <!-- ping success -->
  <text x="250" y="278" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FFCD" opacity=".6">ping 192.168.1.1 — Reply received ✓</text>

  <!-- glow dots on router -->
  <circle cx="222" cy="133" r="3" fill="#00FFCD" opacity=".8"/>
  <circle cx="234" cy="133" r="3" fill="#00FFCD" opacity=".5"/>
  <circle cx="246" cy="133" r="3" fill="#00FFCD" opacity=".3"/>
</svg>
