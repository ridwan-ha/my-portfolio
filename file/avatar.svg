<svg xmlns="http://www.w3.org/2000/svg" width="680" height="680" viewBox="0 0 680 680" role="img">
  <title>Spinning cybersecurity avatar art</title>
  <desc>A dark teal themed geometric spinning avatar with HRA monogram, orbiting rings, and circuit patterns</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&amp;display=swap');
      @keyframes spin     { from{transform:rotate(0deg)}   to{transform:rotate(360deg)} }
      @keyframes spin-rev { from{transform:rotate(360deg)} to{transform:rotate(0deg)} }
      @keyframes pulse    { 0%,100%{opacity:.6} 50%{opacity:1} }
      .ring1 { transform-origin:340px 340px; animation: spin     8s  linear       infinite; }
      .ring2 { transform-origin:340px 340px; animation: spin-rev 5s  linear       infinite; }
      .ring3 { transform-origin:340px 340px; animation: spin     12s linear       infinite; }
      .glow  { transform-origin:340px 340px; animation: pulse    3s  ease-in-out  infinite; }
    </style>
  </defs>

  <!-- background -->
  <circle cx="340" cy="340" r="320" fill="#0a0c0e"/>
  <circle cx="340" cy="340" r="320" fill="none" stroke="#00FFCD" stroke-width="1" opacity=".15"/>

  <!-- outer spinning ring -->
  <g class="ring1">
    <circle cx="340" cy="340" r="300" fill="none" stroke="#00FFCD" stroke-width="1.5" stroke-dasharray="12 8" opacity=".3"/>
    <circle cx="340" cy="20"  r="6" fill="#00FFCD" opacity=".8"/>
    <circle cx="340" cy="660" r="6" fill="#00FFCD" opacity=".8"/>
    <circle cx="20"  cy="340" r="6" fill="#00FFCD" opacity=".8"/>
    <circle cx="660" cy="340" r="6" fill="#00FFCD" opacity=".8"/>
  </g>

  <!-- middle ring reverse -->
  <g class="ring2">
    <circle cx="340" cy="340" r="255" fill="none" stroke="#00FFCD" stroke-width="1" stroke-dasharray="4 10" opacity=".25"/>
    <circle cx="340" cy="87"  r="5" fill="#00FFCD" opacity=".6"/>
    <circle cx="340" cy="593" r="5" fill="#00FFCD" opacity=".6"/>
    <circle cx="87"  cy="340" r="5" fill="#00FFCD" opacity=".6"/>
    <circle cx="593" cy="340" r="5" fill="#00FFCD" opacity=".6"/>
    <circle cx="520" cy="160" r="4" fill="#00FFCD" opacity=".5"/>
    <circle cx="160" cy="520" r="4" fill="#00FFCD" opacity=".5"/>
    <circle cx="520" cy="520" r="4" fill="#00FFCD" opacity=".5"/>
    <circle cx="160" cy="160" r="4" fill="#00FFCD" opacity=".5"/>
  </g>

  <!-- inner slow ring -->
  <g class="ring3">
    <circle cx="340" cy="340" r="210" fill="none" stroke="#00FFCD" stroke-width="0.8" stroke-dasharray="20 5 3 5" opacity=".2"/>
  </g>

  <!-- circuit lines -->
  <g opacity=".12" stroke="#00FFCD" stroke-width="1" fill="none">
    <line x1="340" y1="160" x2="340" y2="60"/>
    <line x1="340" y1="60"  x2="380" y2="60"/>
    <line x1="340" y1="520" x2="340" y2="620"/>
    <line x1="340" y1="620" x2="300" y2="620"/>
    <line x1="160" y1="340" x2="60"  y2="340"/>
    <line x1="60"  y1="340" x2="60"  y2="300"/>
    <line x1="520" y1="340" x2="620" y2="340"/>
    <line x1="620" y1="340" x2="620" y2="380"/>
    <line x1="220" y1="220" x2="150" y2="150"/>
    <line x1="150" y1="150" x2="120" y2="150"/>
    <line x1="460" y1="220" x2="530" y2="150"/>
    <line x1="530" y1="150" x2="560" y2="150"/>
    <line x1="220" y1="460" x2="150" y2="530"/>
    <line x1="150" y1="530" x2="120" y2="530"/>
    <line x1="460" y1="460" x2="530" y2="530"/>
    <line x1="530" y1="530" x2="560" y2="530"/>
    <circle cx="380" cy="60"  r="3" fill="#00FFCD"/>
    <circle cx="300" cy="620" r="3" fill="#00FFCD"/>
    <circle cx="60"  cy="300" r="3" fill="#00FFCD"/>
    <circle cx="620" cy="380" r="3" fill="#00FFCD"/>
    <circle cx="120" cy="150" r="3" fill="#00FFCD"/>
    <circle cx="560" cy="150" r="3" fill="#00FFCD"/>
    <circle cx="120" cy="530" r="3" fill="#00FFCD"/>
    <circle cx="560" cy="530" r="3" fill="#00FFCD"/>
  </g>

  <!-- glow pulse -->
  <g class="glow">
    <circle cx="340" cy="340" r="185" fill="none" stroke="#00FFCD" stroke-width="8" opacity=".08"/>
  </g>

  <!-- face circle -->
  <circle cx="340" cy="340" r="180" fill="#0d2b26"/>
  <circle cx="340" cy="340" r="180" fill="none" stroke="#00FFCD" stroke-width="2"/>
  <circle cx="340" cy="340" r="155" fill="none" stroke="#00FFCD" stroke-width="0.5" opacity=".2"/>
  <circle cx="340" cy="340" r="130" fill="none" stroke="#00FFCD" stroke-width="0.5" opacity=".15"/>

  <!-- HRA monogram -->
  <text x="340" y="320"
    text-anchor="middle"
    font-family="'Orbitron', 'Courier New', monospace"
    font-size="72"
    font-weight="700"
    fill="#00FFCD"
    opacity=".95"
    letter-spacing="-2">HRA</text>

  <!-- name -->
  <text x="340" y="368"
    text-anchor="middle"
    font-family="'Orbitron', 'Courier New', monospace"
    font-size="13"
    font-weight="400"
    fill="#00FFCD"
    opacity=".6"
    letter-spacing="4">RIDWAN</text>

  <!-- accent line -->
  <line x1="260" y1="382" x2="420" y2="382" stroke="#00FFCD" stroke-width="1" opacity=".4"/>

  <!-- tagline -->
  <text x="340" y="400"
    text-anchor="middle"
    font-family="monospace"
    font-size="10"
    fill="#00FFCD"
    opacity=".4"
    letter-spacing="2">CYBERSECURITY</text>

  <!-- tick marks -->
  <g stroke="#00FFCD" stroke-width="1.5" opacity=".4">
    <line x1="340" y1="22"  x2="340" y2="38"/>
    <line x1="340" y1="642" x2="340" y2="658"/>
    <line x1="22"  y1="340" x2="38"  y2="340"/>
    <line x1="642" y1="340" x2="658" y2="340"/>
  </g>

</svg>
